[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    -s
    --tb=short
    --strict-markers
    --strict-config

markers =
    smoke: critical path tests (login, create clan, create category)
    regression: full regression suite
    multilang: tests that must pass across locales (avoid text-based assertions)
    auth: authentication tests (tests/auth/)
    clans: clan management tests (tests/clans/)
    categories: category management tests (tests/categories/)
    channels: channel and messaging tests (tests/channels/)
    messages: message tests (tests/messages/)
    e2e: end-to-end flows spanning multiple features (tests/e2e/)

filterwarnings =
    ignore::DeprecationWarning
